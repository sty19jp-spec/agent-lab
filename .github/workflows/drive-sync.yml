name: Drive Sync

on:
  workflow_dispatch:
  push:
    branches:
      - feature/drive-sync

jobs:
  upload:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Create test file
        run: |
          echo "Hello from GitHub Actions at $(date)" > test.txt

      - name: Upload to Drive
        run: |
          gcloud auth application-default print-access-token > token.txt
          ACCESS_TOKEN=$(cat token.txt)
          curl -X POST \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -F "metadata={name :'test.txt', parents:['${{ secrets.DRIVE_FOLDER_ID }}']};type=application/json;charset=UTF-8" \
            -F "file=@test.txt;type=text/plain" \
            "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart"
