name: drive-sync-runbooks

on:
  push:
    branches: [ "main" ]
    paths:
      - "runbooks/**"
      - ".github/workflows/drive-sync.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

jobs:
  upload_runbooks_tgz:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: auth
        name: Auth to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/drive.file

      - name: Build archive
        run: |
          set -euo pipefail
          tar -czf runbooks.tgz runbooks

      - name: Upload to Google Drive (files.create multipart)
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          FILE_NAME: agent-lab_runbooks_${{ github.sha }}.tgz
        run: |
          set -euo pipefail
          test -n "${DRIVE_FOLDER_ID}"
          curl -sS -X POST \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -F "metadata={\"name\":\"${FILE_NAME}\",\"parents\":[\"${DRIVE_FOLDER_ID}\"]};type=application/json; charset=UTF-8" \
            -F "file=@runbooks.tgz;type=application/gzip" \
            "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart"
