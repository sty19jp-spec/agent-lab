name: Drive Sync (latest + history)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF/OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Create payload files
        run: |
          set -euo pipefail
          TS="$(date -u +%Y%m%dT%H%M%SZ)"
          echo "backup-latest generated at ${TS}" > backup-latest.txt
          cp -a backup-latest.txt "backup-${TS}.txt"
          echo "TS=${TS}" >> "$GITHUB_ENV"

      - name: Ensure Drive folders + Upload files (Drive API via curl)
        env:
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          TS: ${{ env.TS }}
        run: |
          set -euo pipefail

          test -n "${DRIVE_FOLDER_ID}" || { echo "ERR: missing DRIVE_FOLDER_ID"; exit 1; }
          test -n "${TS}" || { echo "ERR: missing TS"; exit 1; }

          ACCESS_TOKEN="$(gcloud auth print-access-token)"
          DRIVE_FILES="https://www.googleapis.com/drive/v3/files"
          DRIVE_UPLOAD="https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart"

          qenc() {
            python3 - <<'PYC'
import os, urllib.parse
print(urllib.parse.quote(os.environ["Q"], safe=""))
PYC
          }

          find_folder() {
            local name="$1" parent="$2"
            export Q="name='${name//\'/\\\'}' and mimeType='application/vnd.google-apps.folder' and '${parent}' in parents and trashed=false"
            local enc; enc="$(qenc)"
            curl -sS -H "Authorization: Bearer ${ACCESS_TOKEN}" \
              "${DRIVE_FILES}?q=${enc}&fields=files(id,name)" \
            | python3 - <<'PYC'
import json,sys
d=json.load(sys.stdin)
fs=d.get("files") or []
print(fs[0]["id"] if fs else "")
PYC
          }

          create_folder() {
            local name="$1" parent="$2"
            NAME="$name" PARENT="$parent" python3 - <<'PYC' > /tmp/create-folder.json
import json, os
print(json.dumps({"name": os.environ["NAME"], "mimeType":"application/vnd.google-apps.folder", "parents":[os.environ["PARENT"]]}, ensure_ascii=False))
PYC
            curl -sS -X POST \
              -H "Authorization: Bearer ${ACCESS_TOKEN}" \
              -H "Content-Type: application/json; charset=UTF-8" \
              -d @/tmp/create-folder.json \
              "${DRIVE_FILES}?fields=id" \
            | python3 - <<'PYC'
import json,sys
print(json.load(sys.stdin)["id"])
PYC
          }

          ensure_folder() {
            local name="$1" parent="$2"
            local id; id="$(find_folder "$name" "$parent")"
            if [ -z "$id" ]; then
              id="$(create_folder "$name" "$parent")"
            fi
            echo "$id"
          }

          latest_id="$(ensure_folder "latest"  "${DRIVE_FOLDER_ID}")"
          history_id="$(ensure_folder "history" "${DRIVE_FOLDER_ID}")"

          yyyy="$(date -u +%Y)"
          mm="$(date -u +%m)"
          yyyy_mm="${yyyy}-${mm}"

          y_id="$(ensure_folder "${yyyy}"     "${history_id}")"
          ym_id="$(ensure_folder "${yyyy_mm}" "${y_id}")"

          upload_file() {
            local name="$1" parent="$2" path="$3" mime="$4"
            NAME="$name" PARENT="$parent" python3 - <<'PYC' > /tmp/meta.json
import json, os
print(json.dumps({"name": os.environ["NAME"], "parents":[os.environ["PARENT"]]}, ensure_ascii=False))
PYC
            curl -sS -X POST \
              -H "Authorization: Bearer ${ACCESS_TOKEN}" \
              -F "metadata=@/tmp/meta.json;type=application/json;charset=UTF-8" \
              -F "file=@${path};type=${mime}" \
              "${DRIVE_UPLOAD}" >/dev/null
          }

          upload_file "README-運用ルール.txt" "${DRIVE_FOLDER_ID}" "docs/drive-sync/README-運用ルール.txt" "text/plain"
          upload_file "backup-latest.txt" "${latest_id}"       "backup-latest.txt" "text/plain"
          upload_file "backup-${TS}.txt"   "${ym_id}"          "backup-${TS}.txt" "text/plain"

          echo "OK: latest_id=${latest_id} history_month_id=${ym_id}"
